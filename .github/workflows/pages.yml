name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: hasik/package-lock.json

      - name: Install hasik dependencies
        run: npm ci --prefix hasik

      - name: Build hasik for Pages
        run: npm run build:pages --prefix hasik

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/assets _site/lunchtime _site/pantry _site/hasik
          cp index.html _site/index.html
          cp -R assets/. _site/assets/
          cp lunchtime/index.html lunchtime/lunchtime.html _site/lunchtime/
          cp pantry/index.html _site/pantry/
          cp -R hasik/out/. _site/hasik/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
