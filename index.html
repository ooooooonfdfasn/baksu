<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>(주) 백수</title>
    <meta
      name="description"
      content="집에서 함께 접속하는 백수 사무실과 하위 서비스 모음"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f5;
        --ink: #111315;
        --muted: #5f6871;
        --line: #d8dde1;
        --panel: #ffffff;
        --panel-soft: #eef7f1;
        --green: #0f9d59;
        --green-dark: #0a7040;
        --red: #df503f;
        --yellow: #ffd45a;
        --blue: #246bfe;
        --shadow: 0 18px 60px rgba(17, 19, 21, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-width: 320px;
        min-height: 100%;
        margin: 0;
      }

      body {
        background:
          linear-gradient(90deg, rgba(17, 19, 21, 0.045) 1px, transparent 1px),
          linear-gradient(0deg, rgba(17, 19, 21, 0.045) 1px, transparent 1px),
          var(--bg);
        background-size: 42px 42px;
        color: var(--ink);
        font-family:
          Arial,
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          sans-serif;
        letter-spacing: 0;
      }

      a,
      button {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .site-shell {
        min-height: 100dvh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 58px;
        padding: 0 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
      }

      .brand-mark,
      .topnav {
        display: inline-flex;
        align-items: center;
      }

      .brand-mark {
        gap: 10px;
        font-size: 15px;
        font-weight: 900;
      }

      .brand-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--green);
        box-shadow:
          18px 0 0 var(--yellow),
          36px 0 0 var(--red);
      }

      .topnav {
        gap: 8px;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
      }

      .home {
        display: grid;
        grid-template-columns: minmax(320px, 0.92fr) minmax(420px, 1.08fr);
        gap: 32px;
        align-items: center;
        width: min(1180px, calc(100% - 48px));
        margin: 0 auto;
        padding: 36px 0;
      }

      .intro {
        display: grid;
        gap: 24px;
      }

      .status-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .status-item {
        min-width: 0;
        padding: 12px;
        border-right: 1px solid var(--line);
      }

      .status-item:last-child {
        border-right: 0;
      }

      .status-label {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .status-value {
        display: block;
        margin-top: 5px;
        overflow: hidden;
        font-size: 15px;
        font-weight: 900;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      h1 {
        margin: 0;
        font-size: clamp(54px, 8vw, 104px);
        font-weight: 900;
        line-height: 0.94;
      }

      .slogan {
        max-width: 620px;
        margin: 0;
        color: #2b3036;
        font-size: clamp(20px, 2.4vw, 30px);
        font-weight: 850;
        line-height: 1.34;
      }

      .service-list {
        display: grid;
        gap: 10px;
      }

      .service-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        min-height: 86px;
        padding: 16px;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .service-card:hover {
        border-color: var(--green);
        box-shadow: 0 12px 34px rgba(15, 157, 89, 0.16);
      }

      .service-title {
        display: block;
        font-size: 19px;
        font-weight: 950;
      }

      .service-copy {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
        line-height: 1.45;
      }

      .service-state {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid currentColor;
        color: var(--green-dark);
        font-size: 12px;
        font-weight: 900;
        white-space: nowrap;
      }

      .service-card:nth-child(2) .service-state {
        color: var(--blue);
      }

      .preview-zone {
        align-self: stretch;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 570px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .preview-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 48px;
        padding: 0 14px;
        border-bottom: 1px solid var(--line);
      }

      .preview-title {
        font-size: 13px;
        font-weight: 950;
      }

      .preview-state {
        color: var(--green-dark);
        font-size: 12px;
        font-weight: 900;
      }

      .preview-frame-wrap {
        position: relative;
        min-height: 0;
        overflow: hidden;
        background: #ffffff;
      }

      .preview-frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        pointer-events: none;
      }

      .preview-overlay {
        position: absolute;
        right: 14px;
        bottom: 14px;
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        background: rgba(17, 19, 21, 0.88);
        color: #ffffff;
        font-size: 12px;
        font-weight: 850;
      }

      @media (max-width: 900px) {
        .site-shell {
          display: block;
        }

        .home {
          grid-template-columns: 1fr;
          width: min(640px, calc(100% - 28px));
          padding: 28px 0;
        }

        .preview-zone {
          min-height: 430px;
        }
      }

      @media (max-width: 560px) {
        .topbar {
          align-items: stretch;
          flex-direction: column;
          justify-content: center;
          gap: 10px;
          padding: 12px 14px;
        }

        .brand-dot {
          box-shadow:
            14px 0 0 var(--yellow),
            28px 0 0 var(--red);
        }

        .topnav {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          width: 100%;
        }

        .home {
          width: calc(100% - 24px);
          gap: 24px;
        }

        .status-strip,
        .service-card {
          grid-template-columns: 1fr;
        }

        .status-item {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .status-item:last-child {
          border-bottom: 0;
        }

        .service-state {
          width: 100%;
        }

        .preview-zone {
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand-mark" href="index.html" aria-label="(주) 백수 홈">
          <span class="brand-dot" aria-hidden="true"></span>
          <span>(주) 백수</span>
        </a>
        <nav class="topnav" aria-label="서비스 이동">
          <a class="nav-link" href="lunchtime/">점심시간</a>
          <a class="nav-link" href="hasik/">회식</a>
        </nav>
      </header>

      <main class="home">
        <section class="intro" aria-label="(주) 백수 소개">
          <div class="status-strip" aria-label="서비스 상태">
            <div class="status-item">
              <span class="status-label">회사 위치</span>
              <span class="status-value">각자의 집</span>
            </div>
            <div class="status-item">
              <span class="status-label">접속 상태</span>
              <span class="status-value">함께 근무중</span>
            </div>
            <div class="status-item">
              <span class="status-label">하위 공간</span>
              <span class="status-value">점심시간 / 회식</span>
            </div>
          </div>

          <div>
            <h1>백수 사무실</h1>
            <p class="slogan">
              집에 흩어진 사람들이 같은 회사에 접속하듯 모이는 작은 온라인 사무실.
            </p>
          </div>

          <div class="service-list" aria-label="서비스 목록">
            <a class="service-card" href="lunchtime/">
              <span>
                <span class="service-title">점심시간</span>
                <span class="service-copy">메뉴, 잡담, 날씨와 뉴스를 한 화면에서 보는 익명 점심방.</span>
              </span>
              <span class="service-state">바로 입장</span>
            </a>
            <a class="service-card" href="hasik/">
              <span>
                <span class="service-title">회식 hasik</span>
                <span class="service-copy">퇴근 후 익명 역할로 방을 만들고 같이 앉는 회식방.</span>
              </span>
              <span class="service-state">Next 앱</span>
            </a>
          </div>
        </section>

        <aside class="preview-zone" aria-label="점심시간 미리보기">
          <div class="preview-header">
            <span class="preview-title">점심시간 화면</span>
            <span class="preview-state">입장 가능</span>
          </div>
          <div class="preview-frame-wrap">
            <iframe class="preview-frame" src="lunchtime/lunchtime.html" title="점심시간 미리보기"></iframe>
            <span class="preview-overlay">점심시간 열기</span>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
