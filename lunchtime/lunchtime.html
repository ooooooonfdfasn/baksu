<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>점심시간 - 익명 점심 대화 프로토타입</title>
    <meta
      name="description"
      content="직장인이 점심시간에 랜덤 익명으로 대화하고 함께 먹을 사람을 찾는 소통 프로토타입"
    />
    <style>
      :root {
        color-scheme: light;
        --sheet-bg: #ffffff;
        --header-bg: #f4f6f8;
        --panel-bg: #ffffff;
        --ink: #111111;
        --muted: #565f6b;
        --grid: #e8e8e8;
        --header-line: #d6d6d6;
        --accent: #0f9d59;
        --accent-dark: #0b7f46;
        --button-divider: rgba(255, 255, 255, 0.9);
        --strong: var(--accent);
        --select: var(--accent);
        --col-w: 101px;
        --col-head-h: 28px;
        --viewport-h: 100svh;
        --row-h: 21px;
      }

      @supports (height: 100dvh) {
        :root {
          --viewport-h: 100dvh;
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: var(--sheet-bg);
      }

      body {
        height: 100%;
        min-height: 100%;
        margin: 0;
        overflow: hidden;
        overscroll-behavior: none;
        background: var(--sheet-bg);
        color: var(--ink);
        font-family:
          Arial,
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          sans-serif;
        letter-spacing: 0;
      }

      button,
      input {
        font: inherit;
      }

      button {
        color: inherit;
      }

      .screen {
        height: var(--viewport-h);
        min-height: 0;
        width: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
        background: var(--sheet-bg);
      }

      .sheet-grid {
        display: grid;
        grid-template-columns: repeat(12, var(--col-w));
        grid-template-rows: repeat(2, var(--row-h)) var(--col-head-h) repeat(35, var(--row-h));
        height: 100%;
        width: calc(var(--col-w) * 12);
        min-height: 0;
        background: var(--sheet-bg);
        color: var(--ink);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .col-head {
        display: flex;
        align-items: center;
        justify-content: center;
        border-right: 1px solid var(--header-line);
        border-bottom: 1px solid var(--header-line);
        background: var(--header-bg);
        color: var(--ink);
        font-size: 12px;
        line-height: 1;
        user-select: none;
      }

      .col-head {
        position: sticky;
        top: 0;
        z-index: 6;
        grid-row: 3;
      }

      .cell-layer,
      .overlay-layer {
        display: contents;
      }

      .title-cell {
        z-index: 8;
        grid-column: 1 / -1;
        grid-row: 1 / 3;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        min-width: 0;
        min-height: 0;
        margin: 0;
        padding: 4px 8px;
        background: var(--accent);
        color: #ffffff;
        font-size: min(30px, calc(var(--row-h) * 1.45));
        font-weight: 800;
        line-height: 1.1;
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .title-home-button {
        border: 0;
        border-radius: 0;
        cursor: pointer;
        text-align: left;
      }

      .title-home-button:hover,
      .title-home-button:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: -4px;
      }

      .baksu-doc-link {
        z-index: 9;
        grid-column: 11 / 13;
        grid-row: 1 / 3;
        align-self: center;
        justify-self: end;
        display: inline-flex;
        align-items: center;
        min-width: 0;
        min-height: 28px;
        margin-right: 10px;
        padding: 0;
        border: 0;
        background: transparent;
        color: #ffffff;
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
        text-decoration: none;
        white-space: nowrap;
      }

      .baksu-doc-link:hover {
        text-decoration: underline;
      }

      .sheet-cell {
        min-width: 0;
        min-height: 0;
        border: 0;
        border-right: 1px solid var(--grid);
        border-bottom: 1px solid var(--grid);
        background: var(--sheet-bg);
        pointer-events: none;
        user-select: none;
      }

      .merged,
      .panel,
      .sheet-button,
      .chat-input {
        border: 0;
        background: var(--panel-bg);
        color: var(--ink);
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .merged,
      .panel {
        z-index: 3;
        pointer-events: auto;
      }

      .banner-cell {
        grid-column: 1 / 12;
        grid-row: 4 / 5;
        overflow: hidden;
        white-space: nowrap;
      }

      .banner-track {
        display: inline-flex;
        align-items: center;
        min-width: max-content;
        height: 100%;
        animation: marquee 72s linear infinite;
        will-change: transform;
      }

      .banner-track span {
        padding-right: 72px;
        font-size: 13px;
        font-weight: 700;
      }

      @keyframes marquee {
        from {
          transform: translateX(100%);
        }
        to {
          transform: translateX(-100%);
        }
      }

      .option-panel {
        position: relative;
        z-index: 5;
        grid-column: 8 / 9;
        grid-row: 7 / 8;
      }

      .time-panel {
        z-index: 3;
        grid-column: 5 / 7;
        grid-row: 7 / 10;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 6px;
        background: var(--panel-bg);
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .clock {
        font-size: min(31px, calc(var(--row-h) * 1.5));
        font-weight: 700;
        line-height: 1.1;
        text-align: center;
      }

      .quote-panel {
        z-index: 3;
        grid-column: 1 / -1;
        grid-row: 12 / 14;
        display: grid;
        grid-template-rows: repeat(2, var(--row-h));
        align-content: start;
        gap: 0;
        background: var(--panel-bg);
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .quote-panel p {
        display: grid;
        grid-template-columns: var(--col-w) minmax(0, 1fr) var(--col-w);
        align-items: stretch;
        height: var(--row-h);
        min-height: 0;
        margin: 0;
        padding: 0;
        border-bottom: 1px solid var(--grid);
        font-size: 13px;
        line-height: var(--row-h);
        text-align: left;
      }

      .quote-label,
      .quote-text {
        display: flex;
        align-items: center;
        min-width: 0;
        height: 100%;
        padding: 0 6px;
        overflow: hidden;
        white-space: nowrap;
      }

      .quote-label {
        border-right: 1px solid var(--strong);
        font-weight: 700;
      }

      .quote-text {
        text-overflow: ellipsis;
      }

      .quote-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-width: 0;
        height: 100%;
        padding: 0 4px;
        border: 0;
        border-left: 1px solid var(--strong);
        border-radius: 0;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
      }

      .quote-action:hover,
      .quote-action:focus-visible {
        outline: 2px solid var(--select);
        outline-offset: -2px;
        filter: brightness(0.94);
      }

      .quote-panel p:last-child {
        border-bottom: 0;
      }

      .menu-rank-strip {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        gap: 5px;
        overflow: hidden;
        white-space: nowrap;
      }

      .menu-rank-item {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        gap: 3px;
        color: #333333;
      }

      .menu-rank-item strong {
        font-weight: 800;
      }

      .menu-rank-item.rank-1 {
        color: #c69000;
      }

      .menu-rank-item.rank-2 {
        color: #8f969e;
      }

      .menu-rank-item.rank-3 {
        color: #9a5d25;
      }

      .menu-rank-item.rank-4,
      .menu-rank-item.rank-5 {
        color: #333333;
      }

      .lunch-entry-panel {
        z-index: 3;
        grid-column: 1 / -1;
        grid-row: 15 / 17;
        display: grid;
        grid-template-rows: calc(var(--row-h) * 2);
        background: transparent;
        box-shadow: inset 0 0 0 1px var(--strong);
        pointer-events: auto;
      }

      .lunch-entry-form,
      .sentence-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) var(--col-w);
        min-height: calc(var(--row-h) * 2);
      }

      .lunch-input,
      .sentence-input {
        width: 100%;
        min-width: 0;
        min-height: calc(var(--row-h) * 2);
        padding: 0 6px;
        border: 0;
        border-radius: 0;
        background: var(--panel-bg);
        color: #111111;
        -webkit-text-fill-color: #111111;
        font-size: 16px;
        outline: 0;
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .lunch-input::placeholder,
      .sentence-input::placeholder {
        color: #aeb4bb;
        -webkit-text-fill-color: #aeb4bb;
        opacity: 1;
      }

      .lunch-save-button,
      .sentence-save-button {
        min-width: 0;
        min-height: calc(var(--row-h) * 2);
      }

      .content-page-panel {
        z-index: 4;
        grid-column: 1 / -1;
        grid-row: 12 / 26;
        display: grid;
        grid-template-rows: calc(var(--row-h) * 2) minmax(0, 1fr) var(--row-h);
        background: var(--panel-bg);
        box-shadow: inset 0 0 0 1px var(--strong);
        pointer-events: auto;
      }

      .menu-content-page {
        grid-template-rows: calc(var(--row-h) * 2) minmax(0, 1fr);
      }

      .content-page-panel[hidden] {
        display: none;
      }

      .content-page-tool {
        min-height: var(--row-h);
        font-size: 12px;
      }

      .content-list,
      .menu-candidate-list {
        min-height: 0;
        overflow: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }

      .thread-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) calc(var(--col-w) * 2);
        min-height: var(--row-h);
        border-bottom: 1px solid var(--grid);
        background: var(--panel-bg);
      }

      .menu-candidate-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) calc(var(--col-w) * 2);
        min-height: calc(var(--row-h) * 2);
        border-bottom: 1px solid var(--grid);
        background: var(--panel-bg);
      }

      .thread-body {
        display: flex;
        align-items: center;
        min-width: 0;
        height: var(--row-h);
        padding: 0 6px;
        overflow: hidden;
        color: var(--ink);
        font-size: 13px;
        font-weight: 700;
        line-height: var(--row-h);
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .menu-candidate-body {
        min-width: 0;
        padding: 4px 6px;
        overflow: hidden;
        color: var(--ink);
        font-size: 13px;
        font-weight: 700;
        line-height: 1.25;
      }

      .vote-box,
      .menu-count-box {
        display: grid;
        min-width: 0;
        border-left: 1px solid var(--strong);
      }

      .vote-box {
        grid-template-columns: 1fr 1fr;
      }

      .menu-count-box {
        grid-template-columns: 1fr 1fr;
      }

      .vote-button {
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        gap: 4px;
        min-width: 0;
        min-height: var(--row-h);
        padding: 0 5px;
        border: 0;
        border-right: 1px solid var(--grid);
        border-radius: 0;
        background: var(--panel-bg);
        color: var(--ink);
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      .vote-button[data-vote="up"] {
        color: var(--accent-dark);
      }

      .vote-button[data-vote="down"] {
        color: #7b828a;
      }

      .vote-icon {
        flex: 0 0 auto;
        width: 15px;
        height: 15px;
        object-fit: contain;
      }

      .menu-count-value {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 0;
        min-height: calc(var(--row-h) * 2);
        padding: 0 4px;
        border: 0;
        border-right: 1px solid var(--grid);
        border-radius: 0;
        background: var(--panel-bg);
        color: var(--ink);
        font-size: 12px;
        font-weight: 800;
      }

      .vote-button:last-child,
      .menu-count-value:last-child {
        border-right: 0;
      }

      .vote-button:hover,
      .vote-button:focus-visible {
        outline: 2px solid var(--select);
        outline-offset: -2px;
      }

      .pagination-row,
      .menu-random-row {
        display: grid;
        min-height: var(--row-h);
        border-top: 1px solid var(--strong);
      }

      .pagination-row {
        grid-template-columns: var(--col-w) var(--col-w) minmax(0, 1fr) var(--col-w);
      }

      .menu-random-row {
        grid-template-columns: var(--col-w) minmax(0, 1fr) var(--col-w) var(--col-w);
      }

      .page-indicator,
      .random-result {
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 0;
        padding: 0 6px;
        overflow: hidden;
        color: var(--ink);
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .menu-candidate-item.rank-1 .menu-candidate-body,
      .menu-candidate-item.rank-1 .menu-count-value {
        color: #c69000;
      }

      .menu-candidate-item.rank-2 .menu-candidate-body,
      .menu-candidate-item.rank-2 .menu-count-value {
        color: #8f969e;
      }

      .menu-candidate-item.rank-3 .menu-candidate-body,
      .menu-candidate-item.rank-3 .menu-count-value {
        color: #9a5d25;
      }

      .menu-candidate-item.rank-4 .menu-candidate-body,
      .menu-candidate-item.rank-4 .menu-count-value {
        color: #333333;
      }

      .sponsor-button {
        z-index: 3;
        grid-column: 5 / 7;
        grid-row: 10 / 11;
      }

      .chat-panel {
        z-index: 3;
        grid-column: 4 / 9;
        grid-row: 31 / 33;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: min-content calc(var(--row-h) * 2);
        align-content: end;
        background: transparent;
        pointer-events: auto;
      }

      .chat-panel.has-visible-messages {
        grid-row: 27 / 33;
        grid-template-rows: min-content calc(var(--row-h) * 2);
      }

      .chat-dock {
        display: block;
        grid-column: 1 / -1;
        margin-bottom: -1px;
        background: transparent;
      }

      .message-feed {
        display: grid;
        align-content: start;
        max-height: calc(var(--row-h) * 4);
        overflow: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        border-bottom: 0;
        background: transparent;
      }

      .message-feed:not(.has-messages) {
        display: none;
      }

      .message-feed p {
        display: block;
        height: var(--row-h);
        min-height: 0;
        margin: 0;
        padding: 0 6px;
        border-bottom: 1px solid var(--grid);
        background: var(--panel-bg);
        color: #111111 !important;
        -webkit-text-fill-color: #111111 !important;
        font-size: 13px;
        font-weight: 700;
        line-height: var(--row-h);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        transition:
          opacity 700ms ease,
          transform 700ms ease;
      }

      .message-feed p:last-child {
        border-bottom: 0;
      }

      .message-feed span {
        margin-right: 6px;
        color: var(--muted);
        -webkit-text-fill-color: var(--muted);
        font-weight: 700;
      }

      .message-feed .message-text {
        min-width: 0;
        margin-right: 0;
        overflow: hidden;
        color: #111111 !important;
        -webkit-text-fill-color: #111111 !important;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .message-feed p.is-fading {
        opacity: 0;
        transform: translateY(-2px);
      }

      .chat-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) var(--col-w);
        height: calc(var(--row-h) * 2);
      }

      .chat-input {
        width: 100%;
        height: calc(var(--row-h) * 2);
        padding: 0 6px;
        border-radius: 0;
        background: var(--panel-bg);
        color: #111111;
        -webkit-text-fill-color: #111111;
        font-size: 16px;
        outline: 0;
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .chat-input::placeholder {
        color: var(--muted);
        opacity: 1;
      }

      .notice-panel {
        grid-column: 1 / -1;
        grid-row: 33 / 35;
        display: grid;
        grid-template-columns: var(--col-w) minmax(0, 1fr);
        align-items: center;
        overflow: hidden;
        padding: 0;
        font-size: 13px;
        text-align: center;
      }

      .notice-label {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        width: 100%;
        height: 100%;
        min-width: 0;
        padding: 0 6px;
        border-right: 1px solid var(--strong);
        font-weight: 700;
      }

      .notice-text {
        display: flex;
        align-items: center;
        min-width: 0;
        height: 100%;
        padding: 0 6px;
        overflow: hidden;
        color: var(--ink);
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .panel-row {
        display: flex;
        align-items: center;
        min-width: 0;
        min-height: var(--row-h);
        padding: 0 4px;
        border-bottom: 1px solid var(--strong);
        font-size: 13px;
        line-height: 1;
        text-align: left;
      }

      .panel-row:last-child {
        border-bottom: 0;
      }

      .sheet-button {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-width: 0;
        height: 100%;
        min-height: var(--row-h);
        padding: 0 4px;
        border-radius: 0;
        background: var(--accent);
        color: #ffffff;
        box-shadow: inset 0 0 0 1px var(--strong);
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        line-height: 1;
        text-align: center;
      }

      .option-back-cell {
        z-index: 3;
        grid-column: 1 / 2;
        grid-row: 4 / 5;
      }

      .option-page-panel {
        z-index: 3;
        grid-column: 1 / 7;
        grid-row: 6 / 10;
        display: grid;
        grid-template-rows: repeat(4, var(--row-h));
        background: var(--panel-bg);
        box-shadow: inset 0 0 0 1px var(--strong);
      }

      .option-setting-row {
        display: grid;
        grid-template-columns: calc(var(--col-w) * 2) minmax(0, 1fr);
        min-height: var(--row-h);
        border-bottom: 1px solid var(--grid);
      }

      .option-setting-row:last-child {
        border-bottom: 0;
      }

      .option-setting-label,
      .option-setting-control {
        display: flex;
        align-items: center;
        min-width: 0;
        height: var(--row-h);
        padding: 0 6px;
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
      }

      .option-setting-label {
        border-right: 1px solid var(--strong);
      }

      .option-setting-control {
        padding: 0;
      }

      .option-setting-control .sheet-button {
        height: var(--row-h);
      }

      .sheet-button:hover,
      .sheet-button:focus-visible {
        outline: 2px solid var(--select);
        outline-offset: -2px;
        filter: brightness(0.94);
      }

      .sheet-button.is-active {
        background: var(--accent-dark);
        color: #ffffff;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 30;
        max-width: min(360px, calc(100% - 36px));
        min-height: var(--row-h);
        padding: 6px 8px;
        border: 1px solid var(--strong);
        background: var(--panel-bg);
        color: var(--ink);
        font-size: 13px;
        font-weight: 700;
      }

      .toast[hidden] {
        display: none;
      }

      @media (max-width: 760px) {
        :root {
          --col-w: calc(100vw / 6);
          --col-head-h: 30px;
          --row-h: 24px;
        }

        .screen {
          height: var(--viewport-h);
          min-height: 0;
          overflow-x: hidden;
          overflow-y: hidden;
        }

        .title-cell {
          grid-column: 1 / 7;
        }

        .baksu-doc-link {
          grid-column: 5 / 7;
          min-height: 24px;
          margin-right: 8px;
          font-size: 11px;
        }

        .banner-cell {
          grid-column: 1 / -1;
        }

        .time-panel {
          grid-column: 2 / 6;
          grid-row: 6 / 8;
        }

        .option-panel {
          grid-column: 5 / 6;
          grid-row: 8 / 9;
        }

        .sponsor-button {
          grid-column: 2 / 5;
          grid-row: 8 / 9;
        }

        .quote-panel {
          grid-column: 1 / 7;
          grid-row: 10 / 12;
        }

        .lunch-entry-panel {
          grid-column: 1 / 7;
          grid-row: 13 / 15;
        }

        .content-page-panel {
          grid-column: 1 / 7;
          grid-row: 10 / 25;
        }

        .chat-panel {
          grid-column: 1 / 7;
          grid-row: 32 / 34;
        }

        .chat-panel.has-visible-messages {
          grid-row: 28 / 34;
        }

        .is-chat-focused .chat-panel {
          grid-row: 23 / 34;
        }

        .notice-panel {
          grid-column: 1 / 7;
          grid-row: 34 / 36;
        }

        .is-chat-focused .notice-panel {
          grid-row: 34 / 36;
        }

        .is-chat-focused .message-feed {
          max-height: calc(var(--row-h) * 8);
        }

        .option-toggle {
          box-shadow:
            inset 1px 0 0 var(--button-divider),
            inset 0 0 0 1px var(--strong);
        }

        .banner-track span,
        .panel-row,
        .quote-panel p,
        .sheet-button {
          font-size: 12px;
        }

        .clock {
          font-size: 24px;
          line-height: 1;
        }

        .quote-label {
          font-size: 11px;
        }

        .quote-action,
        .content-page-tool,
        .page-indicator,
        .random-result,
        .vote-button,
        .menu-count-value {
          font-size: 11px;
        }

        .thread-body,
        .menu-candidate-body {
          font-size: 12px;
        }

        .toast {
          right: 12px;
          bottom: 12px;
          max-width: calc(100% - 24px);
        }
      }
    </style>
  </head>
  <body>
    <main class="screen" id="mainScreen">
      <section class="sheet-grid" aria-label="점심시간 스프레드시트 화면">
        <button type="button" class="title-cell title-home-button" id="titleHomeButton">점심시간</button>
        <a class="baksu-doc-link" href="../articles/lunch-menu.html" aria-label="점심시간 이용안내 보기">이용안내</a>
        <div class="cell-layer" id="cellLayer" aria-hidden="true"></div>
        <div class="overlay-layer">
          <section class="merged banner-cell" aria-label="상단 정보 배너">
            <div class="banner-track">
              <span>날씨: 서울 구름 조금 25도, 강수 확률 10%</span>
              <span>뉴스: 점심시간 랜덤 대화방 베타 테스트 진행 중</span>
              <span>경제: 코스피 보합권 출발, 환율은 소폭 하락</span>
              <span>생활: 오늘의 추천 메뉴는 냉모밀, 돈가스, 제육</span>
              <span>스포츠: 저녁 7시 야구 경기 주요 매치업 안내</span>
              <span>주식: 관심 종목 알림은 점심 이후 업데이트</span>
            </div>
          </section>

          <section class="time-panel" aria-label="현재 시간">
            <div class="clock" id="clock">9:31</div>
          </section>

          <section class="option-panel" aria-label="옵션">
            <button
              type="button"
              class="sheet-button option-toggle"
              id="optionToggle"
              aria-controls="optionScreen"
            >
              옵션
            </button>
          </section>

          <button type="button" class="sheet-button sponsor-button" id="sponsorButton">후원하기</button>

          <section class="quote-panel" aria-label="오늘의 문장">
            <p>
              <span class="quote-label">오늘의 문장</span>
              <span class="quote-text" id="todaySentenceText">점심은 작은 리셋 버튼이다.</span>
              <button type="button" class="quote-action" id="openBoardButton">게시판</button>
            </p>
            <p>
              <span class="quote-label">메뉴 후보</span>
              <span class="quote-text" id="menuCandidateText">냉모밀 / 제육 / 샐러드 / 돈가스</span>
              <button type="button" class="quote-action" id="openMenuButton">전체보기</button>
            </p>
          </section>

          <section class="lunch-entry-panel" id="mainLunchPanel" aria-label="오늘의 메뉴 입력">
            <form class="lunch-entry-form" id="menuSubmitForm">
              <input
                class="lunch-input"
                id="menuInput"
                maxlength="40"
                autocomplete="off"
                enterkeyhint="done"
                placeholder="여기에 오늘의 메뉴 입력"
              />
              <button type="submit" class="sheet-button lunch-save-button">저장</button>
            </form>
          </section>

          <section class="content-page-panel" id="sentenceBoardPanel" aria-label="오늘의 문장 게시판" hidden>
            <form class="sentence-form" id="sentenceForm">
              <input
                class="sentence-input"
                id="sentenceInput"
                maxlength="80"
                autocomplete="off"
                enterkeyhint="done"
                placeholder="오늘의 문장 입력"
              />
              <button type="submit" class="sheet-button sentence-save-button">저장</button>
            </form>
            <div class="content-list" id="sentenceThreadList"></div>
            <div class="pagination-row">
              <button type="button" class="sheet-button content-page-tool" id="sentenceSortButton">추천순</button>
              <button type="button" class="sheet-button content-page-tool" id="sentencePrevButton">이전</button>
              <span class="page-indicator" id="sentencePageIndicator">1 / 1</span>
              <button type="button" class="sheet-button content-page-tool" id="sentenceNextButton">다음</button>
            </div>
          </section>

          <section class="content-page-panel menu-content-page" id="menuCandidatePanel" aria-label="메뉴 후보 페이지" hidden>
            <div class="menu-random-row">
              <button type="button" class="sheet-button content-page-tool" id="menuRandomButton">랜덤</button>
              <span class="random-result" id="menuRandomResult">랜덤 메뉴 대기</span>
              <button type="button" class="sheet-button content-page-tool" id="menuSortButton">많은순</button>
              <button type="button" class="sheet-button content-page-tool" id="menuReverseButton">적은순</button>
            </div>
            <div class="menu-candidate-list" id="menuCandidateList"></div>
          </section>

          <section class="chat-panel" id="chatPanel" aria-label="채팅">
            <div class="chat-dock" id="chatDock">
              <div class="message-feed" id="messageFeed" aria-live="polite"></div>
              <form class="chat-form" id="chatForm">
                <input
                  class="chat-input"
                  id="chatInput"
                  maxlength="120"
                  autocomplete="off"
                  enterkeyhint="enter"
                  placeholder="채팅 입력"
                />
                <button type="button" class="sheet-button" id="chatSendButton">전송</button>
              </form>
            </div>
          </section>

          <footer class="merged notice-panel" aria-label="공지">
            <strong class="notice-label">공지</strong>
            <span class="notice-text">...</span>
          </footer>
        </div>
      </section>
    </main>

    <main class="screen option-screen" id="optionScreen" hidden>
      <section class="sheet-grid option-grid" aria-label="옵션 화면">
        <h1 class="title-cell">옵션</h1>
        <a class="baksu-doc-link" href="../articles/lunch-menu.html" aria-label="점심시간 이용안내 보기">이용안내</a>
        <div class="cell-layer" id="optionCellLayer" aria-hidden="true"></div>
        <div class="overlay-layer">
          <div class="option-back-cell">
            <button type="button" class="sheet-button" id="backToMainButton">뒤로</button>
          </div>

          <section class="option-page-panel" aria-label="옵션 설정">
            <div class="option-setting-row">
              <span class="option-setting-label">시간 표시</span>
              <div class="option-setting-control">
                <button type="button" class="sheet-button" id="timeModeToggle">24시간</button>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" hidden></div>

    <script>
      const stateKey = "lunchtime-sheet-state";
      const contentStateKey = "lunchtime-content-state";
      const columns = "ABCDEFGHIJKL".split("");
      const rowCount = 35;
      const messageVisibleMs = 10 * 1000;
      const messageFadeMs = 700;
      const sentencePageSize = 20;
      const defaultSentences = [
        { text: "점심은 작은 리셋 버튼이다.", up: 12, down: 1 },
        { text: "메뉴를 고르는 시간도 점심시간이다.", up: 8, down: 0 },
        { text: "오늘은 같이 먹지 않아도 같이 쉬는 날.", up: 5, down: 1 }
      ];
      const defaultMenus = [
        "냉모밀",
        "제육",
        "돈가스",
        "샐러드",
        "냉모밀",
        "김밥",
        "제육",
        "돈가스",
        "쌀국수",
        "냉모밀",
        "비빔밥",
        "샐러드"
      ];

      const mainScreen = document.querySelector("#mainScreen");
      const optionScreen = document.querySelector("#optionScreen");
      const cellLayer = document.querySelector("#cellLayer");
      const optionCellLayer = document.querySelector("#optionCellLayer");
      const clock = document.querySelector("#clock");
      const optionToggle = document.querySelector("#optionToggle");
      const backToMainButton = document.querySelector("#backToMainButton");
      const timeModeToggle = document.querySelector("#timeModeToggle");
      const sponsorButton = document.querySelector("#sponsorButton");
      const titleHomeButton = document.querySelector("#titleHomeButton");
      const chatPanel = document.querySelector("#chatPanel");
      const chatInput = document.querySelector("#chatInput");
      const chatForm = document.querySelector("#chatForm");
      const chatSendButton = document.querySelector("#chatSendButton");
      const messageFeed = document.querySelector("#messageFeed");
      const todaySentenceText = document.querySelector("#todaySentenceText");
      const menuCandidateText = document.querySelector("#menuCandidateText");
      const openBoardButton = document.querySelector("#openBoardButton");
      const openMenuButton = document.querySelector("#openMenuButton");
      const mainLunchPanel = document.querySelector("#mainLunchPanel");
      const menuSubmitForm = document.querySelector("#menuSubmitForm");
      const menuInput = document.querySelector("#menuInput");
      const sentenceBoardPanel = document.querySelector("#sentenceBoardPanel");
      const sentenceSortButton = document.querySelector("#sentenceSortButton");
      const sentenceForm = document.querySelector("#sentenceForm");
      const sentenceInput = document.querySelector("#sentenceInput");
      const sentenceThreadList = document.querySelector("#sentenceThreadList");
      const sentencePrevButton = document.querySelector("#sentencePrevButton");
      const sentenceNextButton = document.querySelector("#sentenceNextButton");
      const sentencePageIndicator = document.querySelector("#sentencePageIndicator");
      const menuCandidatePanel = document.querySelector("#menuCandidatePanel");
      const menuSortButton = document.querySelector("#menuSortButton");
      const menuReverseButton = document.querySelector("#menuReverseButton");
      const menuRandomButton = document.querySelector("#menuRandomButton");
      const menuRandomResult = document.querySelector("#menuRandomResult");
      const menuCandidateList = document.querySelector("#menuCandidateList");
      const toast = document.querySelector("#toast");

      const state = loadState();
      const contentState = loadContentState();
      let messages = [];
      let timeMode = state.timeMode;
      let sentenceThreads = contentState.sentences;
      let menuEntries = contentState.menus;
      let contentView = "main";
      let sentenceSortMode = "top";
      let sentencePage = 1;
      let menuSortMode = "desc";
      let toastTimer = null;
      const messageTimers = new Map();
      let keepChatOpenUntil = 0;

      function getActiveScreen() {
        return document.querySelector(".screen:not([hidden])") || mainScreen;
      }

      function lockPageScroll({ resetX = false } = {}) {
        mainScreen.scrollTop = 0;
        optionScreen.scrollTop = 0;
        document.scrollingElement.scrollTop = 0;
        document.body.scrollTop = 0;
        window.scrollTo(0, 0);

        if (resetX) {
          mainScreen.scrollLeft = 0;
          optionScreen.scrollLeft = 0;
        }
      }

      function syncViewportHeight() {
        const viewportHeight = window.visualViewport?.height || window.innerHeight;
        if (viewportHeight > 0) {
          document.documentElement.style.setProperty("--viewport-h", `${viewportHeight}px`);
        }
        lockPageScroll();
      }

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(stateKey) || "{}");
          return {
            timeMode: saved.timeMode === "12" ? "12" : "24"
          };
        } catch {
          return { timeMode: "24" };
        }
      }

      function createId(prefix = "item") {
        return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function loadContentState() {
        const now = Date.now();
        const fallback = {
          sentences: defaultSentences.map((item, index) => ({
            id: `default-sentence-${index + 1}`,
            text: item.text,
            up: item.up,
            down: item.down,
            at: now - (defaultSentences.length - index) * 60000
          })),
          menus: [...defaultMenus]
        };

        try {
          const saved = JSON.parse(localStorage.getItem(contentStateKey) || "{}");
          const savedSentences = Array.isArray(saved.sentences)
            ? saved.sentences
                .filter((item) => item && typeof item.text === "string")
                .map((item, index) => ({
                  id: typeof item.id === "string" ? item.id : `saved-sentence-${index + 1}`,
                  text: normalizeText(item.text, 80),
                  up: Math.max(0, Number(item.up) || 0),
                  down: Math.max(0, Number(item.down) || 0),
                  at: Number.isFinite(Number(item.at)) ? Number(item.at) : now
                }))
                .filter((item) => item.text)
            : [];
          const savedMenus = Array.isArray(saved.menus)
            ? saved.menus
                .map((item) => normalizeText(String(item || ""), 40))
                .filter(Boolean)
            : [];

          return {
            sentences: savedSentences.length > 0 ? savedSentences : fallback.sentences,
            menus: savedMenus.length > 0 ? savedMenus : fallback.menus
          };
        } catch {
          return fallback;
        }
      }

      function saveState() {
        localStorage.setItem(stateKey, JSON.stringify({ timeMode }));
      }

      function saveContentState() {
        localStorage.setItem(
          contentStateKey,
          JSON.stringify({
            sentences: sentenceThreads,
            menus: menuEntries
          })
        );
      }

      function normalizeText(text, maxLength) {
        return text.replace(/\s+/g, " ").trim().slice(0, maxLength);
      }

      function escapeHtml(text) {
        return text.replace(/[&<>"']/g, (character) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        })[character]);
      }

      function buildSheet(targetLayer) {
        columns.forEach((column, index) => {
          const head = document.createElement("div");
          head.className = "col-head";
          head.style.gridColumn = String(index + 1);
          head.textContent = column;
          targetLayer.before(head);
        });

        for (let row = 1; row <= rowCount; row += 1) {
          columns.forEach((column, columnIndex) => {
            const cell = document.createElement("div");
            cell.className = "sheet-cell";
            cell.style.gridColumn = String(columnIndex + 1);
            cell.style.gridRow = String(row + 3);
            targetLayer.appendChild(cell);
          });
        }
      }

      function syncPageFromHash() {
        const showOptions = window.location.hash === "#options";
        mainScreen.hidden = showOptions;
        optionScreen.hidden = !showOptions;
        document.documentElement.classList.toggle("is-options-page", showOptions);
        lockPageScroll({ resetX: true });
      }

      function openOptionsPage() {
        if (window.location.hash !== "#options") {
          window.location.hash = "options";
          return;
        }
        syncPageFromHash();
      }

      function openMainPage() {
        history.pushState(null, "", `${window.location.pathname}${window.location.search}`);
        syncPageFromHash();
      }

      function setChatFocusMode(active) {
        document.documentElement.classList.toggle("is-chat-focused", active);
      }

      function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, "0");

        if (timeMode === "12") {
          hours = hours % 12 || 12;
        }

        clock.textContent = `${hours}:${minutes}`;
        timeModeToggle.textContent = timeMode === "24" ? "24시간" : "12시간";
        timeModeToggle.setAttribute("aria-pressed", String(timeMode === "12"));
      }

      function getTopSentence() {
        return [...sentenceThreads].sort((left, right) => {
          if (right.up !== left.up) {
            return right.up - left.up;
          }
          const leftScore = left.up - left.down;
          const rightScore = right.up - right.down;
          if (rightScore !== leftScore) {
            return rightScore - leftScore;
          }
          return right.at - left.at;
        })[0];
      }

      function getMenuStats() {
        const counts = new Map();
        menuEntries.forEach((entry) => {
          const text = normalizeText(entry, 40);
          if (!text) {
            return;
          }
          counts.set(text, (counts.get(text) || 0) + 1);
        });

        return [...counts.entries()]
          .map(([text, count]) => ({ text, count }))
          .sort((left, right) => {
            if (right.count !== left.count) {
              return right.count - left.count;
            }
            return left.text.localeCompare(right.text, "ko-KR");
          });
      }

      function renderMainContent() {
        const topSentence = getTopSentence();
        todaySentenceText.textContent = topSentence
          ? `${topSentence.text} 추천 ${topSentence.up}`
          : "아직 등록된 문장이 없습니다.";

        const topMenus = getMenuStats().slice(0, 5);
        menuCandidateText.innerHTML = "";

        if (topMenus.length <= 0) {
          menuCandidateText.textContent = "아직 등록된 메뉴가 없습니다.";
          return;
        }

        const strip = document.createElement("span");
        strip.className = "menu-rank-strip";
        topMenus.forEach((item, index) => {
          const node = document.createElement("span");
          node.className = `menu-rank-item rank-${index + 1}`;
          node.innerHTML = `<strong>${escapeHtml(item.text)}</strong><span>${item.count}</span>`;
          strip.appendChild(node);
        });
        menuCandidateText.appendChild(strip);
      }

      function getSortedSentenceThreads() {
        return [...sentenceThreads].sort((left, right) => {
          if (sentenceSortMode === "top") {
            if (right.up !== left.up) {
              return right.up - left.up;
            }
            const leftScore = left.up - left.down;
            const rightScore = right.up - right.down;
            if (rightScore !== leftScore) {
              return rightScore - leftScore;
            }
          }
          return right.at - left.at;
        });
      }

      function renderSentenceBoard() {
        sentenceSortButton.textContent = sentenceSortMode === "top" ? "추천순" : "최신순";
        const sorted = getSortedSentenceThreads();
        const totalPages = Math.max(1, Math.ceil(sorted.length / sentencePageSize));
        sentencePage = Math.min(sentencePage, totalPages);
        const start = (sentencePage - 1) * sentencePageSize;
        const pageItems = sorted.slice(start, start + sentencePageSize);

        sentenceThreadList.innerHTML = "";
        if (pageItems.length <= 0) {
          const empty = document.createElement("div");
          empty.className = "thread-item";
          empty.innerHTML = '<div class="thread-body">아직 등록된 문장이 없습니다.</div>';
          sentenceThreadList.appendChild(empty);
        } else {
          pageItems.forEach((item) => {
            const article = document.createElement("article");
            article.className = "thread-item";
            article.innerHTML = `
              <div class="thread-body">${escapeHtml(item.text)}</div>
              <div class="vote-box">
                <button type="button" class="vote-button" data-vote="up" data-id="${item.id}">
                  <img class="vote-icon" src="../assets/lunch-vote-arrow-up.svg" alt="" aria-hidden="true" />
                  추천 ${item.up}
                </button>
                <button type="button" class="vote-button" data-vote="down" data-id="${item.id}">
                  <img class="vote-icon" src="../assets/lunch-vote-arrow-down.svg" alt="" aria-hidden="true" />
                  비추천 ${item.down}
                </button>
              </div>
            `;
            sentenceThreadList.appendChild(article);
          });
        }

        sentencePageIndicator.textContent = `${sentencePage} / ${totalPages}`;
        sentencePrevButton.disabled = sentencePage <= 1;
        sentenceNextButton.disabled = sentencePage >= totalPages;
      }

      function renderMenuCandidatePage() {
        menuSortButton.textContent = "많은순";
        menuReverseButton.textContent = "적은순";
        menuSortButton.classList.toggle("is-active", menuSortMode === "desc");
        menuReverseButton.classList.toggle("is-active", menuSortMode === "asc");
        const stats = getMenuStats();
        const sorted = menuSortMode === "desc" ? stats : [...stats].reverse();

        menuCandidateList.innerHTML = "";
        if (sorted.length <= 0) {
          const empty = document.createElement("article");
          empty.className = "menu-candidate-item";
          empty.innerHTML = '<div class="menu-candidate-body">아직 등록된 메뉴가 없습니다.</div>';
          menuCandidateList.appendChild(empty);
          return;
        }

        sorted.forEach((item, index) => {
          const rank = stats.findIndex((candidate) => candidate.text === item.text) + 1;
          const article = document.createElement("article");
          article.className = `menu-candidate-item rank-${Math.min(rank || index + 1, 4)}`;
          article.innerHTML = `
            <div class="menu-candidate-body">${escapeHtml(item.text)}</div>
            <div class="menu-count-box">
              <span class="menu-count-value">${rank}위</span>
              <span class="menu-count-value">${item.count}번</span>
            </div>
          `;
          menuCandidateList.appendChild(article);
        });
      }

      function renderContentPanels() {
        renderMainContent();
        renderSentenceBoard();
        renderMenuCandidatePage();
        mainLunchPanel.hidden = contentView !== "main";
        sentenceBoardPanel.hidden = contentView !== "board";
        menuCandidatePanel.hidden = contentView !== "menu";
      }

      function setContentView(nextView) {
        contentView = nextView;
        renderContentPanels();
        lockPageScroll();
      }

      function renderMessages() {
        messageFeed.innerHTML = "";
        messageFeed.classList.toggle("has-messages", messages.length > 0);
        chatPanel.classList.toggle("has-visible-messages", messages.length > 0);
        messages.forEach((message) => {
          const item = document.createElement("p");
          item.dataset.id = message.id;
          item.classList.toggle("is-fading", Boolean(message.isFading));
          item.textContent = `${message.name} ${message.text}`;
          messageFeed.appendChild(item);
        });
        scrollMessageFeedToBottom();
      }

      function scrollMessageFeedToBottom() {
        messageFeed.scrollTop = messageFeed.scrollHeight;
        requestAnimationFrame(() => {
          messageFeed.scrollTop = messageFeed.scrollHeight;
        });
      }

      function sendMessage(text, { keepFocus = true } = {}) {
        const trimmed = text.trim();
        if (!trimmed) {
          return;
        }

        const message = {
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          name: `익명${Math.floor(100 + Math.random() * 900)}`,
          text: trimmed
        };

        messages.push(message);
        chatInput.value = "";
        renderMessages();
        scheduleMessageRemoval(message.id);
        if (keepFocus) {
          keepChatOpenBriefly();
          keepChatInputFocused();
        }
      }

      function keepChatOpenBriefly() {
        keepChatOpenUntil = Date.now() + 650;
      }

      function focusChatInputNow() {
        try {
          chatInput.focus({ preventScroll: true });
        } catch {
          chatInput.focus();
        }
      }

      function keepChatInputFocused() {
        const screen = getActiveScreen();

        requestAnimationFrame(() => {
          focusChatInputNow();
          screen.scrollTop = 0;
          lockPageScroll();
          alignChatInputToViewport();
          requestAnimationFrame(() => {
            screen.scrollTop = 0;
            lockPageScroll();
            alignChatInputToViewport();
          });
        });
      }

      function alignChatInputToViewport() {
        const screen = document.querySelector(".screen");
        screen.scrollTop = 0;
        lockPageScroll();
      }

      function scrollToSheetTop() {
        lockPageScroll({ resetX: true });
      }

      function returnToTopAfterKeyboardClose() {
        scrollToSheetTop();
        requestAnimationFrame(scrollToSheetTop);
        setTimeout(scrollToSheetTop, 180);
        setTimeout(scrollToSheetTop, 360);
      }

      function scheduleMessageRemoval(id) {
        clearMessageTimers(id);
        const fadeTimer = setTimeout(() => {
          const message = messages.find((item) => item.id === id);
          if (!message) {
            return;
          }
          message.isFading = true;
          renderMessages();
        }, messageVisibleMs);

        const removeTimer = setTimeout(() => {
          removeMessage(id);
        }, messageVisibleMs + messageFadeMs);

        messageTimers.set(id, { fadeTimer, removeTimer });
      }

      function clearMessageTimers(id) {
        const timers = messageTimers.get(id);
        if (!timers) {
          return;
        }
        clearTimeout(timers.fadeTimer);
        clearTimeout(timers.removeTimer);
        messageTimers.delete(id);
      }

      function removeMessage(id) {
        clearMessageTimers(id);
        messages = messages.filter((message) => message.id !== id);
        renderMessages();
      }

      function showToast(text) {
        clearTimeout(toastTimer);
        toast.textContent = text;
        toast.hidden = false;
        toastTimer = setTimeout(() => {
          toast.hidden = true;
        }, 2200);
      }

      syncViewportHeight();
      buildSheet(cellLayer);
      buildSheet(optionCellLayer);
      renderMessages();
      renderContentPanels();
      updateClock();
      syncPageFromHash();

      optionToggle.addEventListener("click", () => {
        openOptionsPage();
      });

      backToMainButton.addEventListener("click", () => {
        openMainPage();
      });

      timeModeToggle.addEventListener("click", () => {
        timeMode = timeMode === "24" ? "12" : "24";
        updateClock();
        saveState();
      });

      sponsorButton.addEventListener("click", () => {
        showToast("후원하기 화면은 다음 단계에서 연결합니다.");
      });

      titleHomeButton.addEventListener("click", () => {
        setContentView("main");
        openMainPage();
      });

      openBoardButton.addEventListener("click", () => {
        setContentView("board");
      });

      openMenuButton.addEventListener("click", () => {
        setContentView("menu");
      });

      menuSubmitForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = normalizeText(menuInput.value, 40);
        if (!text) {
          return;
        }
        menuEntries.push(text);
        menuInput.value = "";
        saveContentState();
        renderContentPanels();
        showToast("메뉴 후보가 저장되었습니다.");
      });

      sentenceForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = normalizeText(sentenceInput.value, 80);
        if (!text) {
          return;
        }
        sentenceThreads.unshift({
          id: createId("sentence"),
          text,
          up: 0,
          down: 0,
          at: Date.now()
        });
        sentenceInput.value = "";
        sentenceSortMode = "new";
        sentencePage = 1;
        saveContentState();
        renderContentPanels();
      });

      sentenceSortButton.addEventListener("click", () => {
        sentenceSortMode = sentenceSortMode === "top" ? "new" : "top";
        sentencePage = 1;
        renderContentPanels();
      });

      sentencePrevButton.addEventListener("click", () => {
        sentencePage = Math.max(1, sentencePage - 1);
        renderSentenceBoard();
      });

      sentenceNextButton.addEventListener("click", () => {
        sentencePage += 1;
        renderSentenceBoard();
      });

      sentenceThreadList.addEventListener("click", (event) => {
        const button = event.target.closest(".vote-button");
        if (!button) {
          return;
        }
        const item = sentenceThreads.find((sentence) => sentence.id === button.dataset.id);
        if (!item) {
          return;
        }
        if (button.dataset.vote === "up") {
          item.up += 1;
        } else {
          item.down += 1;
        }
        saveContentState();
        renderContentPanels();
      });

      menuSortButton.addEventListener("click", () => {
        menuSortMode = "desc";
        renderMenuCandidatePage();
      });

      menuReverseButton.addEventListener("click", () => {
        menuSortMode = "asc";
        renderMenuCandidatePage();
      });

      menuRandomButton.addEventListener("click", () => {
        const uniqueMenus = getMenuStats().map((item) => item.text);
        if (uniqueMenus.length <= 0) {
          menuRandomResult.textContent = "등록된 메뉴가 없습니다.";
          return;
        }
        const selected = uniqueMenus[Math.floor(Math.random() * uniqueMenus.length)];
        menuRandomResult.textContent = selected;
      });

      chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        sendMessage(chatInput.value);
      });

      function sendFromChatControl(event) {
        keepChatOpenBriefly();
        event.preventDefault();
        sendMessage(chatInput.value);
      }

      chatSendButton.addEventListener("pointerdown", sendFromChatControl);

      chatSendButton.addEventListener("touchstart", (event) => {
        if (!window.PointerEvent) {
          sendFromChatControl(event);
          return;
        }
        keepChatOpenBriefly();
      });

      chatSendButton.addEventListener("mousedown", (event) => {
        if (!window.PointerEvent) {
          sendFromChatControl(event);
        }
      });

      chatSendButton.addEventListener("click", (event) => {
        sendFromChatControl(event);
      });

      chatInput.addEventListener("focus", () => {
        setChatFocusMode(true);
        lockPageScroll();
        requestAnimationFrame(alignChatInputToViewport);
      });

      chatInput.addEventListener("blur", () => {
        setTimeout(() => {
          if (document.activeElement !== chatInput) {
            if (Date.now() < keepChatOpenUntil) {
              keepChatInputFocused();
              return;
            }
            returnToTopAfterKeyboardClose();
          }
        }, 120);
      });

      chatInput.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") {
          return;
        }
        event.preventDefault();
        sendMessage(chatInput.value);
      });

      window.visualViewport?.addEventListener("resize", () => {
        syncViewportHeight();
        if (document.activeElement === chatInput) {
          setChatFocusMode(true);
          alignChatInputToViewport();
        }
      });

      window.addEventListener("resize", syncViewportHeight);
      window.addEventListener("scroll", lockPageScroll, { passive: true });
      mainScreen.addEventListener("scroll", lockPageScroll, { passive: true });
      optionScreen.addEventListener("scroll", lockPageScroll, { passive: true });
      window.addEventListener("hashchange", syncPageFromHash);

      setInterval(updateClock, 30 * 1000);
    </script>
  </body>
</html>
