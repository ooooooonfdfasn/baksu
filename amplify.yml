version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 24 || (nvm install 24 && nvm use 24)
        - npm ci --prefix hasik
    build:
      commands:
        - NEXT_PUBLIC_BASE_PATH=/hasik GITHUB_PAGES=true NEXT_TELEMETRY_DISABLED=1 npm run build:pages --prefix hasik
        - bash scripts/build-amplify-site.sh
  artifacts:
    baseDirectory: _site
    files:
      - "**/*"
  cache:
    paths:
      - hasik/node_modules/**/*
      - hasik/.next/cache/**/*
